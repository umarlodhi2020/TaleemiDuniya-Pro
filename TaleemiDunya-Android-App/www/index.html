<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#090b10">
    <title>TaleemiDunya Mini App</title>
    <style>
        :root {
            --bg: #090b10;
            --card: #151921;
            --primary: #9333ea;
            --accent: #6366f1;
            --text: #ffffff;
            --text-dim: #9ca3af;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: var(--bg);
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text);
            overflow: hidden;
            height: 100vh;
        }

        /* Dashboard UI */
        #mini-dashboard {
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100%;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .header { margin-bottom: 24px; margin-top: 10px; }
        .header h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
        .header p { color: var(--text-dim); font-size: 13px; margin-top: 4px; }

        /* Shortcuts Row */
        .shortcuts-container { margin-bottom: 24px; }
        .section-title { font-size: 11px; font-weight: 800; color: var(--text-dim); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.6; }
        .shortcuts-scroll { display: flex; gap: 14px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .shortcuts-scroll::-webkit-scrollbar { display: none; }

        .shortcut-item { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; width: 64px; }
        .shortcut-icon {
            width: 48px; height: 48px; background: var(--card); border-radius: 16px;
            display: flex; align-items: center; justify-content: center; margin-bottom: 8px;
            border: 1px solid rgba(255,255,255,0.05); transition: all 0.2s;
        }
        .shortcut-item:active .shortcut-icon { transform: scale(0.9); border-color: var(--primary); background: rgba(147, 51, 234, 0.1); }
        .shortcut-item span { font-size: 10px; font-weight: 600; color: var(--text-dim); text-align: center; }

        /* Main Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
        .menu-card {
            background: var(--card); border: 1px solid rgba(255,255,255,0.03); border-radius: 24px;
            padding: 24px 16px; display: flex; flex-direction: column; align-items: center; text-align: center;
        }
        .icon-box {
            width: 50px; height: 50px; border-radius: 18px; margin-bottom: 12px;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            box-shadow: 0 8px 15px rgba(147, 51, 234, 0.2);
        }
        .menu-card h3 { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
        .menu-card p { font-size: 10px; color: var(--text-dim); }

        /* Feature View (Iframe Overlay) */
        #feature-view {
            position: fixed; inset: 0; background: var(--bg); z-index: 1000;
            transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column;
        }
        #feature-view.active { transform: translateY(0); }

        .top-bar {
            padding: 10px 16px; background: var(--card); display: flex; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .back-btn { background: rgba(255,255,255,0.05); border: none; color: white; padding: 10px 16px; border-radius: 14px; font-weight: 700; font-size: 13px; }

        /* Iframe Container to hide Sidebar/Header */
        .iframe-wrapper {
            flex-grow: 1; overflow: hidden; position: relative; background: #000;
        }
        iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: none;
        }

        .spinner { width: 24px; height: 24px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-left: auto; }
        @keyframes spin { to { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div id="mini-dashboard">
        <div class="header" style="display: flex; align-items: center; gap: 14px;">
            <div style="width: 50px; height: 50px; background: linear-gradient(135deg, var(--primary), var(--accent)); border-radius: 16px; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 16px rgba(147, 51, 234, 0.25); flex-shrink: 0;">
                <svg width="30" height="30" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M256 140L120 210L256 280L392 210L256 140Z" fill="white"/>
                    <path d="M160 235V310C160 340 210 360 256 360C302 360 352 340 352 310V235L256 285L160 235Z" fill="white" fill-opacity="0.8"/>
                    <path d="M392 210V320" stroke="#f59e0b" stroke-width="12" stroke-linecap="round"/>
                </svg>
            </div>
            <div>
                <p style="color: var(--text-dim); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">Admin Portal</p>
                <h1 style="font-size: 22px; font-weight: 800; letter-spacing: -0.5px;">TaleemiDunya <span style="color: var(--primary);">Mini</span></h1>
            </div>
        </div>

        <div class="shortcuts-container">
            <div class="section-title">Quick Shortcuts</div>
            <div class="shortcuts-scroll">
                <div class="shortcut-item" onclick="openFeature('add-student', 'Add Student')">
                    <div class="shortcut-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9333ea" stroke-width="2.5"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="16" y1="11" x2="22" y2="11"/></svg></div>
                    <span>Admission</span>
                </div>
                <div class="shortcut-item" onclick="openFeature('take-staff-attendance', 'Staff Attendance')">
                    <div class="shortcut-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/></svg></div>
                    <span>Staff</span>
                </div>
                <div class="shortcut-item" onclick="openFeature('daily-expenses', 'Expenses')">
                    <div class="shortcut-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#f43f5e" stroke-width="2.5"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>
                    <span>Finance</span>
                </div>
                <div class="shortcut-item" onclick="openFeature('student-id-cards', 'ID Cards')">
                    <div class="shortcut-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2.5"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M7 10h10"/><path d="M7 14h10"/></svg></div>
                    <span>Cards</span>
                </div>
            </div>
        </div>

        <div class="grid">
            <div class="menu-card" onclick="openFeature('take-attendance', 'Attendance')">
                <div class="icon-box"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><polyline points="16 11 18 13 22 9"/></svg></div>
                <h3>Attendance</h3>
                <p>Students Presence</p>
            </div>
            <div class="menu-card" onclick="openFeature('broadcast-diary', 'Homework')">
                <div class="icon-box" style="background: linear-gradient(135deg, #ec4899, #f43f5e);"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></div>
                <h3>Diary</h3>
                <p>Post Daily Task</p>
            </div>
            <div class="menu-card" onclick="openFeature('fee-recovery-scanner', 'Scanner')">
                <div class="icon-box" style="background: linear-gradient(135deg, #10b981, #059669);"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M7 7h.01"/><path d="M17 7h.01"/><path d="M7 17h.01"/><path d="M17 17h.01"/></svg></div>
                <h3>Fee Scanner</h3>
                <p>Collect Dues</p>
            </div>
            <div class="menu-card" onclick="openFeature('online-quizzes', 'Quizzes')">
                <div class="icon-box" style="background: linear-gradient(135deg, #f59e0b, #d97706);"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg></div>
                <h3>Quizzes</h3>
                <p>Live Testing</p>
            </div>
        </div>

        <button onclick="openFeature('pocket-app', 'Dashboard')" style="margin-top:auto; background: rgba(147, 51, 234, 0.1); border: 1px solid var(--primary); color: var(--primary); padding: 14px; border-radius: 18px; font-size: 13px; font-weight: 700;">Full Executive Dashboard</button>
    </div>

    <div id="feature-view">
        <div class="top-bar">
            <button class="back-btn" onclick="closeFeature()">← Close</button>
            <span id="feature-title" style="font-weight: 700; font-size: 15px; margin-left: 10px;">Feature</span>
            <div id="loader" class="spinner"></div>
        </div>
        <div class="iframe-wrapper">
            <iframe id="app-frame" src=""></iframe>
        </div>
    </div>

    <script src="capacitor.js"></script>
    <script>
        const dashboard = document.getElementById('mini-dashboard');
        const view = document.getElementById('feature-view');
        const frame = document.getElementById('app-frame');
        const title = document.getElementById('feature-title');
        const loader = document.getElementById('loader');

        const BASE_URL = "https://taleemidunya-pro-ed44e.web.app/#/school-admin/";

        function openFeature(route, label) {
            title.innerText = label;
            loader.style.display = 'block';
            // Adding ?minimal=1 as a hint to the web app
            frame.src = BASE_URL + route + "?minimal=1&is_native=1";
            view.classList.add('active');
            dashboard.style.opacity = '0.5';
            dashboard.style.transform = 'scale(0.95)';
        }

        function closeFeature() {
            view.classList.remove('active');
            dashboard.style.opacity = '1';
            dashboard.style.transform = 'scale(1)';
            setTimeout(() => { frame.src = ""; }, 400);
        }

        frame.onload = () => { loader.style.display = 'none'; };

        window.addEventListener('DOMContentLoaded', () => {
            if (window.Capacitor && window.Capacitor.Plugins.App) {
                window.Capacitor.Plugins.App.addListener('backButton', () => {
                    if (view.classList.contains('active')) closeFeature();
                    else window.Capacitor.Plugins.App.exitApp();
                });
            }
        });
    </script>
</body>
</html>
